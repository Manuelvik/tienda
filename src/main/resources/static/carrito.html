<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Carrito - Tienda Tec</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="productos.html">Tienda Tec</a>
    <button class="btn btn-outline-light" onclick="cerrarSesion()">Cerrar sesión</button>
</nav>

<div class="container mt-4">
    <h2>Mi carrito</h2>

    <table class="table table-bordered table-striped mt-3">
        <thead class="table-dark">
        <tr>
            <th>Producto</th>
            <th>Precio</th>
            <th>Cantidad</th>
            <th>Subtotal</th>
            <th>Acción</th>
        </tr>
        </thead>
        <tbody id="tablaCarrito"></tbody>
    </table>

    <h4 class="text-end">Total: S/ <span id="total">0.00</span></h4>

    <button class="btn btn-success float-end mt-3" onclick="generarPedido()">
        Generar pedido
    </button>
</div>

<script src="js/carrito.js"></script>
</body>
</html>
